name: smartbirth_mobile
description: SmartBirth Clinical Anatomy & Mechanism Pre-VR Learning Quest Game app.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  soundpool: ^2.4.1
  webview_flutter: ^4.4.0
  webview_flutter_web: ^0.2.3+4
  vibration: ^1.8.0
  flutter_animate: ^4.2.0
  pdf: ^3.10.0
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/three/ # For holding web Three.js simulation code
